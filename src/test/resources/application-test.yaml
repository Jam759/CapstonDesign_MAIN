spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:capstone-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-client-id
            client-secret: test-client-secret

auth:
  jwt:
    issuer: "test-issuer"
    access-key: "MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY="
    refresh-key: "RkVEQ0JBOTg3NjU0MzIxMEZFRENCQTk4NzY1NDMyMTA="
    access-ttl: 15
    refresh-ttl: 7
    cookie-name: "REFRESH_TOKEN"
    cookie-http-only: true
    cookie-secure: false
    cookie-samesite: "Lax"
    front-redirect-url: "http://localhost:8080/tmp/oauth2/test"
